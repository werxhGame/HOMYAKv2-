<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOMYAKv2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
            padding: 12px;
        }
        .game {
            background: #14142a;
            padding: 20px;
            border-radius: 28px;
            box-shadow: 0 0 60px #6c4aff44;
            text-align: center;
            width: 440px;
            max-width: 100%;
            border: 1px solid #2a2a5a;
            position: relative;
        }
        h1 { font-size: 28px; background: linear-gradient(135deg, #ff6b6b, #feca57, #6c4aff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stats {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 4px;
            margin: 12px 0;
            font-size: 14px;
            background: #1e1e3a;
            padding: 10px 14px;
            border-radius: 60px;
        }
        .stats span { color: #b06cff; font-weight: 700; }
        .click-btn {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: none;
            background: radial-gradient(circle at 30% 30%, #b06cff, #4a2a8a);
            font-size: 50px;
            cursor: pointer;
            transition: 0.12s;
            box-shadow: 0 0 40px #6c4aff66;
            color: #fff;
        }
        .click-btn:active { transform: scale(0.88); }
        .click-btn.cooldown { opacity: 0.4; pointer-events: none; }

        .shop-container {
            margin-top: 14px;
            display: none;
            flex-direction: column;
            gap: 6px;
        }
        .shop-container.open { display: flex; }
        .shop-item {
            background: #1a1a36;
            padding: 8px 12px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2a2a5a;
            font-size: 14px;
        }
        .shop-item button {
            background: #6c4aff;
            border: none;
            color: #fff;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
        }
        .shop-item button:hover { background: #8a6aff; }
        .shop-item button:disabled { opacity: 0.4; pointer-events: none; }

        .shop-toggle-btn {
            margin-top: 16px;
            width: 100%;
            padding: 14px 0;
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #6c4aff, #4a2a8a);
            border: none;
            border-radius: 40px;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 2px;
            box-shadow: 0 0 30px #6c4aff44;
        }
        .shop-toggle-btn:hover { transform: scale(1.02); box-shadow: 0 0 50px #6c4aff88; }
        .shop-toggle-btn:active { transform: scale(0.96); }

        .token-shop-title { margin-top: 10px; font-size: 15px; font-weight: 700; color: #6c4aff; }
        .prestige-block {
            margin-top: 14px;
            padding: 12px;
            background: #1a1a36;
            border-radius: 18px;
            border: 1px solid #2a2a5a;
        }
        .prestige-title { font-size: 16px; font-weight: 700; color: #feca57; }
        .prestige-progress { margin: 6px 0; height: 8px; background: #2a2a4a; border-radius: 20px; overflow: hidden; }
        .prestige-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #feca57, #ff6b6b); border-radius: 20px; transition: width 0.25s; }
        .prestige-info { display: flex; justify-content: space-between; font-size: 12px; color: #b0a0d0; }
        .prestige-btn {
            background: #feca57;
            border: none;
            color: #1a1a2a;
            font-weight: 800;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 6px;
        }
        .prestige-btn:disabled { opacity: 0.3; pointer-events: none; }
        .prestige-btn:hover:not(:disabled) { background: #ffd966; }
        .prestige-reward { font-size: 13px; color: #b06cff; margin-top: 4px; }
        .reset {
            margin-top: 12px;
            background: none;
            border: 1px solid #5a3a7a;
            color: #8866aa;
            padding: 4px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
        }
        .reset:hover { background: #2a1a4a; border-color: #b06cff; }
        .admin-panel { margin-top: 12px; padding: 12px; background: #1a1a36; border-radius: 18px; border: 1px solid #6c4aff66; }
        .admin-panel button {
            background: #6c4aff;
            border: none;
            color: #fff;
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            margin: 4px;
        }
        .admin-panel button:hover { background: #8a6aff; }
        .admin-toggle { background: #feca57 !important; color: #1a1a2a !important; }
        .admin-toggle:hover { background: #ffd966 !important; }
        .hidden { display: none !important; }
        .creator-toggle {
            position: fixed;
            top: 12px;
            left: 12px;
            background: #2a2a4a;
            border: 1px solid #6c4aff66;
            color: #fff;
            font-size: 22px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 999;
        }
        .creator-toggle:hover { background: #3a3a5a; }
        .creator-panel {
            position: fixed;
            top: 70px;
            left: 12px;
            background: #14142a;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #6c4aff66;
            box-shadow: 0 0 60px #6c4aff44;
            z-index: 1000;
            width: 240px;
            text-align: center;
        }
        .creator-panel input {
            background: #0a0a1a;
            border: 1px solid #2a2a5a;
            color: #fff;
            padding: 6px 12px;
            border-radius: 30px;
            width: 140px;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .creator-panel button {
            background: #6c4aff;
            border: none;
            color: #fff;
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            margin: 4px;
            width: 100%;
        }
        .creator-panel button:hover { background: #8a6aff; }
        .creator-panel .danger { background: #ff6b6b; }
        .creator-panel .danger:hover { background: #ff5252; }
        .creator-panel .success { background: #51cf66; }
        .creator-panel .success:hover { background: #69db7c; }
        .creator-panel .close-btn {
            background: #ff6b6b;
            position: absolute;
            top: 6px;
            right: 10px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 16px;
            padding: 0;
            line-height: 28px;
            text-align: center;
            cursor: pointer;
            border: none;
            color: #fff;
        }
        .creator-panel .close-btn:hover { background: #ff5252; }
        .creator-panel .title { font-size: 16px; font-weight: 700; color: #feca57; margin-bottom: 12px; }
    </style>
</head>
<body>

<!-- Кнопка создателя -->
<button class="creator-toggle" id="creatorToggle">⚙️</button>

<!-- Панель создателя -->
<div class="creator-panel hidden" id="creatorPanel">
    <button class="close-btn" id="creatorClose">✕</button>
    <div class="title">🔐 ПАНЕЛЬ СОЗДАТЕЛЯ</div>
    <input type="text" id="creatorCode" placeholder="Введите код">
    <button id="creatorUnlock">🔓 Разблокировать</button>
    <hr style="border-color:#2a2a5a; margin: 10px 0;">
    <button id="creatorInfiniteTokens" class="success" disabled>🪙 Бесконечные токены</button>
    <button id="creatorInfiniteTaps" class="success" disabled>⚡ Бесконечные тапы</button>
    <button id="creatorWinGame" class="danger" disabled>🏆 Пройти игру</button>
</div>

<!-- ИГРА -->
<div class="game" id="app">
    <h1>💵 HOMYAKv2</h1>
    <div class="stats">
        <div>💰 <span id="coins">0</span></div>
        <div>⚡ <span id="perClick">1</span></div>
        <div>👑 <span id="prestigeCount">0</span></div>
        <div>🪙 <span id="tokens">0</span></div>
    </div>

    <button class="click-btn" id="clickBtn">👆</button>

    <!-- МАГАЗИН -->
    <div class="shop-container" id="shopContainer">
        <div class="shop-item"><span>📈 +1 за клик</span><button id="shopClick" data-cost="25">Купить (25)</button></div>
        <div class="shop-item"><span>🔄 +1 авто-клик/сек</span><button id="shopAuto" data-cost="50">Купить (50)</button></div>
        <div class="token-shop-title">🪙 МАГАЗИН ТОКЕНОВ</div>
        <div class="shop-item"><span>⚡ 2X тап</span><button id="tokenDouble" data-cost="50">50 🪙</button></div>
        <div class="shop-item"><span>⏩ Пропустить перерождение</span><button id="tokenSkip" data-cost="200">200 🪙</button></div>
        <div class="shop-item"><span>🛠️ Админ-панель</span><button id="tokenAdmin" data-cost="500">500 🪙</button></div>
    </div>

    <!-- БОЛЬШАЯ КНОПКА МАГАЗИНА -->
    <button class="shop-toggle-btn" id="shopToggleBtn">🎭 МАГАЗИН</button>

    <!-- Админ-панель -->
    <div class="admin-panel hidden" id="adminPanel">
        <button class="admin-toggle" id="adminToggle">📂 Открыть админ-панель</button>
        <div id="adminContent" class="hidden" style="margin-top:10px;">
            <button id="adminTokensBtn">🪙 +50 токенов</button>
            <button id="adminTapsBtn">⚡ +500 тапов/сек</button>
        </div>
    </div>

    <div class="prestige-block">
        <div class="prestige-title">🌀 ПЕРЕРОЖДЕНИЕ</div>
        <div class="prestige-info">
            <span>👆 Натапано: <span id="totalClicks">0</span></span>
            <span>🎯 До след.: <span id="clicksToNext">1000</span></span>
        </div>
        <div class="prestige-progress"><div class="prestige-fill" id="prestigeFill"></div></div>
        <button class="prestige-btn" id="prestigeBtn">🔄 Переродиться</button>
        <div class="prestige-reward" id="prestigeReward">⭐ Награда: +1 клик за тап</div>
    </div>

    <button class="reset" id="resetBtn">⟳ Сброс</button>
  </div><script>
// ============================================================
//  СОСТОЯНИЕ
// ============================================================
const state = {
    coins: 0,
    perClick: 1,
    autoClicks: 0,
    autoInterval: null,
    canClick: true,

    tokens: 0,
    tokenInterval: null,

    prestigeLevel: 0,
    totalClicks: 0,
    clicksThisLife: 0,
    thresholds: [1000, 5000, 15000, 20000, 50000],
    rewards: [
        { desc: '⭐ +1 клик за тап', bonus: 1 },
        { desc: '— нет бонуса', bonus: 0 },
        { desc: '— нет бонуса', bonus: 0 },
        { desc: '— нет бонуса', bonus: 0 },
        { desc: '🏆 ПОБЕДА!', bonus: 0 }
    ],
    gameEnded: false,

    doubleTap: false,
    adminUnlocked: false,
    adminOpen: false,
    creatorUnlocked: false,

    shopOpen: false,
};

// ============================================================
//  DOM
// ============================================================
const $ = id => document.getElementById(id);
const coinsEl = $('coins');
const perClickEl = $('perClick');
const prestigeCountEl = $('prestigeCount');
const tokensEl = $('tokens');
const totalClicksEl = $('totalClicks');
const clicksToNextEl = $('clicksToNext');
const prestigeFill = $('prestigeFill');
const prestigeBtn = $('prestigeBtn');
const prestigeReward = $('prestigeReward');
const clickBtn = $('clickBtn');
const resetBtn = $('resetBtn');

const shopContainer = $('shopContainer');
const shopToggleBtn = $('shopToggleBtn');

const adminPanel = $('adminPanel');
const adminToggle = $('adminToggle');
const adminContent = $('adminContent');
const adminTokensBtn = $('adminTokensBtn');
const adminTapsBtn = $('adminTapsBtn');

const creatorToggle = $('creatorToggle');
const creatorPanel = $('creatorPanel');
const creatorClose = $('creatorClose');
const creatorCode = $('creatorCode');
const creatorUnlock = $('creatorUnlock');
const creatorInfiniteTokens = $('creatorInfiniteTokens');
const creatorInfiniteTaps = $('creatorInfiniteTaps');
const creatorWinGame = $('creatorWinGame');

// ============================================================
//  ЗВУК
// ============================================================
function playSound() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 800 + Math.random() * 400;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.08, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.1);
    } catch (_) {}
}

// ============================================================
//  ВИБРАЦИЯ И ПОЗДРАВЛЕНИЕ
// ============================================================
function showCelebration() {
    if (navigator.vibrate) {
        navigator.vibrate(2000);
    }

    const overlay = document.createElement('div');
    overlay.style.position = 'fixed';
    overlay.style.top = '0';
    overlay.style.left = '0';
    overlay.style.width = '100%';
    overlay.style.height = '100%';
    overlay.style.background = 'rgba(10, 10, 30, 0.85)';
    overlay.style.display = 'flex';
    overlay.style.justifyContent = 'center';
    overlay.style.alignItems = 'center';
    overlay.style.zIndex = '9999';
    overlay.style.flexDirection = 'column';
    overlay.style.padding = '20px';
    overlay.style.boxSizing = 'border-box';
    overlay.id = 'celebrationOverlay';
    document.body.appendChild(overlay);

    const textEl = document.createElement('div');
    textEl.style.fontSize = '28px';
    textEl.style.fontWeight = '900';
    textEl.style.color = '#feca57';
    textEl.style.textShadow = '0 0 40px #feca57, 0 0 80px #6c4aff';
    textEl.style.textAlign = 'center';
    textEl.style.maxWidth = '90%';
    textEl.style.fontFamily = 'Segoe UI, system-ui, sans-serif';
    overlay.appendChild(textEl);

    const message = '🎉 ДОБРО ПОЖАЛОВАТЬ, СОЗДАТЕЛЬ! 🎉';
    let index = 0;
    let interval = setInterval(() => {
        textEl.textContent += message[index];
        index++;
        if (index >= message.length) {
            clearInterval(interval);
            setTimeout(() => {
                if (overlay.parentNode) overlay.remove();
            }, 3000);
        }
    }, 80);

    for (let i = 0; i < 60; i++) {
        const dot = document.createElement('div');
        dot.style.position = 'fixed';
        dot.style.width = '6px';
        dot.style.height = '6px';
        dot.style.background = `hsl(${Math.random() * 360}, 100%, 60%)`;
        dot.style.borderRadius = '50%';
        dot.style.left = Math.random() * 100 + '%';
        dot.style.top = '-10px';
        dot.style.zIndex = '10000';
        dot.style.boxShadow = '0 0 10px currentColor';
        dot.style.transition = `all ${2 + Math.random() * 2}s ease-out`;
        document.body.appendChild(dot);

        requestAnimationFrame(() => {
            dot.style.top = Math.random() * 100 + '%';
            dot.style.left = (parseFloat(dot.style.left) + (Math.random() - 0.5) * 20) + '%';
            dot.style.transform = `rotate(${Math.random() * 720}deg)`;
        });

        setTimeout(() => {
            if (dot.parentNode) dot.remove();
        }, 4000);
    }
}

// ============================================================
//  ПОЛУЧЕНИЕ СИЛЫ КЛИКА С УЧЁТОМ 2X
// ============================================================
function getDisplayPerClick() {
    let base = state.perClick;
    if (state.doubleTap) {
        return base * 2;
    }
    return base;
}

// ============================================================
//  ОБНОВЛЕНИЕ UI (ВСЕГДА ПОКАЗЫВАЕТ АКТУАЛЬНУЮ СИЛУ)
// ============================================================
function updateUI() {
    // Основные показатели
    coinsEl.textContent = Math.floor(state.coins);
    prestigeCountEl.textContent = state.prestigeLevel;
    tokensEl.textContent = Math.floor(state.tokens);
    totalClicksEl.textContent = state.totalClicks;

    // ОТОБРАЖЕНИЕ СИЛЫ КЛИКА (с учётом 2X)
    const displayPower = getDisplayPerClick();
    let suffix = '';
    if (state.doubleTap) {
        suffix = ' ✨X2';
    }
    perClickEl.textContent = displayPower + suffix;

    // Прогресс перерождения
    const next = getNextThreshold();
    if (next !== null) {
        const needed = Math.max(0, next - state.clicksThisLife);
        clicksToNextEl.textContent = needed;
        const progress = Math.min(1, state.clicksThisLife / next);
        prestigeFill.style.width = (progress * 100) + '%';
    } else {
        clicksToNextEl.textContent = '🏆';
        prestigeFill.style.width = '100%';
    }

    const canPrestige = canPrestigeNow();
    prestigeBtn.disabled = !canPrestige || state.gameEnded;
    const reward = state.rewards[state.prestigeLevel] || state.rewards[0];
    prestigeReward.textContent = '⭐ ' + reward.desc;
    prestigeBtn.textContent = state.gameEnded ? '🏆 ПОБЕДА!' : '🔄 Переродиться';

    // Магазин за монеты
    $('shopClick').disabled = state.coins < parseInt($('shopClick').dataset.cost) || state.gameEnded;
    $('shopAuto').disabled = state.coins < parseInt($('shopAuto').dataset.cost) || state.gameEnded;

    // Магазин токенов
    $('tokenDouble').disabled = state.tokens < 50 || state.doubleTap || state.gameEnded;
    $('tokenSkip').disabled = state.tokens < 200 || state.gameEnded || state.prestigeLevel >= state.thresholds.length;
    $('tokenAdmin').disabled = state.tokens < 500 || state.adminUnlocked || state.gameEnded;

    // Админ-панель
    if (state.adminUnlocked) adminPanel.classList.remove('hidden');
    else adminPanel.classList.add('hidden');

    // Секретная панель
    creatorInfiniteTokens.disabled = !state.creatorUnlocked || state.gameEnded;
    creatorInfiniteTaps.disabled = !state.creatorUnlocked || state.gameEnded;
    creatorWinGame.disabled = !state.creatorUnlocked || state.gameEnded;
}

// ============================================================
//  ТОКЕНЫ (за время)
// ============================================================
function startTokens() {
    if (state.tokenInterval) clearInterval(state.tokenInterval);
    state.tokenInterval = setInterval(() => {
        if (!state.gameEnded) {
            state.tokens += 2 / 60;
            updateUI();
        }
    }, 1000);
}

// ============================================================
//  ПЕРЕРОЖДЕНИЯ
// ============================================================
function getNextThreshold() {
    const idx = state.prestigeLevel;
    if (idx < state.thresholds.length) return state.thresholds[idx];
    return null;
}

function canPrestigeNow() {
    const next = getNextThreshold();
    if (next === null) return false;
    return state.clicksThisLife >= next;
}

function doPrestige() {
    if (state.gameEnded) return;
    if (!canPrestigeNow()) return;

    const reward = state.rewards[state.prestigeLevel];
    if (reward) state.perClick += reward.bonus;

    state.prestigeLevel += 1;
    state.clicksThisLife = 0;
    state.coins = 0;
    state.autoClicks = 0;
    if (state.autoInterval) { clearInterval(state.autoInterval); state.autoInterval = null; }

    if (state.prestigeLevel >= state.thresholds.length) {
        state.gameEnded = true;
        alert('🎉 ПОЗДРАВЛЯЮ! Ты прошёл игру!');
    }

    updateUI();
}

// ============================================================
//  КЛИК (ИСПОЛЬЗУЕТ АКТУАЛЬНУЮ СИЛУ)
// ============================================================
clickBtn.addEventListener('click', () => {
    if (state.gameEnded) return;
    if (!state.canClick) return;

    state.canClick = false;
    clickBtn.classList.add('cooldown');

    let power = getDisplayPerClick();
    state.coins += power;
    state.totalClicks += 1;
    state.clicksThisLife += 1;

    playSound();
    updateUI();

    setTimeout(() => {
        state.canClick = true;
        clickBtn.classList.remove('cooldown');
    }, 500);
});

// ============================================================
//  МАГАЗИН ЗА МОНЕТЫ (ОБНОВЛЯЕТ СИЛУ КЛИКА)
// ============================================================
$('shopClick').addEventListener('click', function() {
    if (state.gameEnded) return;
    let cost = parseInt(this.dataset.cost);
    if (state.coins < cost) return;
    state.coins -= cost;
    state.perClick += 1;
    this.dataset.cost = Math.floor(cost * 1.6);
    this.textContent = 'Купить (' + this.dataset.cost + ')';
    updateUI();
});

$('shopAuto').addEventListener('click', function() {
    if (state.gameEnded) return;
    let cost = parseInt(this.dataset.cost);
    if (state.coins < cost) return;
    state.coins -= cost;
    state.autoClicks += 1;
    this.dataset.cost = Math.floor(cost * 1.8);
    this.textContent = 'Купить (' + this.dataset.cost + ')';
    updateAutoClick();
    updateUI();
});

function updateAutoClick() {
    if (state.autoInterval) clearInterval(state.autoInterval);
    if (state.autoClicks > 0 && !state.gameEnded) {
        state.autoInterval = setInterval(() => {
            if (state.gameEnded) { clearInterval(state.autoInterval); return; }
            state.coins += state.autoClicks;
            updateUI();
        }, 1000);
    }
}

// ============================================================
//  МАГАЗИН ТОКЕНОВ (ОБНОВЛЯЕТ СИЛУ КЛИКА ПРИ 2X)
// ============================================================
$('tokenDouble').addEventListener('click', function() {
    if (state.gameEnded || state.doubleTap) return;
    if (state.tokens < 50) return;
    state.tokens -= 50;
    state.doubleTap = true;
    updateUI();
});

$('tokenSkip').addEventListener('click', function() {
    if (state.gameEnded) return;
    if (state.tokens < 200) return;
    if (state.prestigeLevel >= state.thresholds.length) return;
    state.tokens -= 200;
    const next = getNextThreshold();
    if (next !== null) {
        state.clicksThisLife = next;
    }
    updateUI();
});

$('tokenAdmin').addEventListener('click', function() {
    if (state.gameEnded || state.adminUnlocked) return;
    if (state.tokens < 500) return;
    state.tokens -= 500;
    state.adminUnlocked = true;
    updateUI();
});

// ============================================================
//  АДМИН-ПАНЕЛЬ
// ============================================================
adminToggle.addEventListener('click', function() {
    state.adminOpen = !state.adminOpen;
    if (state.adminOpen) {
        adminContent.classList.remove('hidden');
        this.textContent = '📂 Закрыть админ-панель';
    } else {
        adminContent.classList.add('hidden');
        this.textContent = '📂 Открыть админ-панель';
    }
});

adminTokensBtn.addEventListener('click', function() {
    if (!state.adminUnlocked || state.gameEnded) return;
    state.tokens += 50;
    updateUI();
});

adminTapsBtn.addEventListener('click', function() {
    if (!state.adminUnlocked || state.gameEnded) return;
    state.autoClicks += 500;
    updateAutoClick();
    updateUI();
});

// ============================================================
//  ПАНЕЛЬ СОЗДАТЕЛЯ
// ============================================================
creatorToggle.addEventListener('click', function() {
    creatorPanel.classList.toggle('hidden');
});

creatorClose.addEventListener('click', function() {
    creatorPanel.classList.add('hidden');
});

creatorUnlock.addEventListener('click', function() {
    const code = creatorCode.value.trim();
    if (code === '212400') {
        state.creatorUnlocked = true;
        creatorCode.value = '';
        creatorCode.placeholder = '✅ Доступ получен!';
        creatorUnlock.textContent = '✅ Разблокировано';
        creatorUnlock.disabled = true;
        updateUI();
        showCelebration();
        alert('🔓 Панель создателя разблокирована!');
    } else {
        alert('❌ Неверный код');
    }
});

creatorInfiniteTokens.addEventListener('click', function() {
    if (!state.creatorUnlocked || state.gameEnded) return;
    state.tokens += 9999999;
    updateUI();
});

creatorInfiniteTaps.addEventListener('click', function() {
    if (!state.creatorUnlocked || state.gameEnded) return;
    state.autoClicks += 9999999;
    updateAutoClick();
    updateUI();
});

creatorWinGame.addEventListener('click', function() {
    if (!state.creatorUnlocked || state.gameEnded) return;
    if (confirm('🏆 Пройти игру?')) {
        state.prestigeLevel = state.thresholds.length;
        state.gameEnded = true;
        updateUI();
        alert('🎉 Игра пройдена!');
    }
});

// ============================================================
//  БОЛЬШАЯ КНОПКА МАГАЗИНА
// ============================================================
shopToggleBtn.addEventListener('click', function() {
    state.shopOpen = !state.shopOpen;
    if (state.shopOpen) {
        shopContainer.classList.add('open');
        this.textContent = '🎭 ЗАКРЫТЬ МАГАЗИН';
        this.style.background = 'linear-gradient(135deg, #ff6b6b, #cc0000)';
    } else {
        shopContainer.classList.remove('open');
        this.textContent = '🎭 МАГАЗИН';
        this.style.background = 'linear-gradient(135deg, #6c4aff, #4a2a8a)';
    }
});

// ============================================================
//  ПЕРЕРОЖДЕНИЕ И СБРОС
// ============================================================
prestigeBtn.addEventListener('click', doPrestige);

resetBtn.addEventListener('click', function() {
    if (!confirm('Сбросить ВСЁ? (токены останутся)')) return;

    state.coins = 0;
    state.perClick = 1;
    state.autoClicks = 0;
    state.prestigeLevel = 0;
    state.totalClicks = 0;
    state.clicksThisLife = 0;
    state.gameEnded = false;
    state.doubleTap = false;
    state.adminUnlocked = false;
    state.adminOpen = false;
    state.creatorUnlocked = false;
    state.shopOpen = false;

    if (state.autoInterval) { clearInterval(state.autoInterval); state.autoInterval = null; }

    $('shopClick').dataset.cost = 25;
    $('shopClick').textContent = 'Купить (25)';
    $('shopAuto').dataset.cost = 50;
    $('shopAuto').textContent = 'Купить (50)';

    adminContent.classList.add('hidden');
    adminToggle.textContent = '📂 Открыть админ-панель';

    creatorPanel.classList.add('hidden');
    creatorCode.value = '';
    creatorCode.placeholder = 'Введите код';
    creatorUnlock.textContent = '🔓 Разблокировать';
    creatorUnlock.disabled = false;

    shopContainer.classList.remove('open');
    shopToggleBtn.textContent = '🎭 МАГАЗИН';
    shopToggleBtn.style.background = 'linear-gradient(135deg, #6c4aff, #4a2a8a)';

    updateUI();
});

// ============================================================
//  СТАРТ
// ============================================================
startTokens();
updateUI();
console.log('✅ HOMYAKv2 загружен!');
</script>
</body>
  </html>
